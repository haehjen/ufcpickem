<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UFC 329 Pick 'Em</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --accent-selected: #d20a0a;
            --border-color: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            padding-bottom: 90px;
            user-select: none;
            -webkit-user-select: none;
        }

        h1 {
            text-align: center;
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .section-header {
            max-width: 600px;
            margin: 25px auto 10px auto;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ff3b3b;
            border-bottom: 2px solid #222;
            padding-bottom: 5px;
        }

        .user-info {
            max-width: 600px;
            margin: 0 auto 20px auto;
        }

        .user-info input {
            width: 100%;
            padding: 15px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
        }

        .fight-container {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .fight-row {
            background-color: var(--card-bg);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .fighters {
            display: grid;
            grid-template-columns: 1fr 1fr;
            text-align: center;
            cursor: pointer;
        }

        .fighter-cell {
            padding: 18px 10px;
            font-weight: bold;
            font-size: 1.05rem;
            transition: background 0.15s, color 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--border-color);
        }

        .fighter-cell:first-child {
            border-right: 1px solid var(--border-color);
        }

        .fighter-cell.selected {
            background-color: var(--accent-selected);
            color: #fff;
        }

        .props-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 10px;
            background-color: #171717;
        }

        select {
            background-color: #2a2a2a;
            color: white;
            border: 1px solid var(--border-color);
            padding: 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            outline: none;
            width: 100%;
            -webkit-appearance: none;
        }

        .submit-zone {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #121212;
            padding: 15px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: center;
            z-index: 10;
        }

        .btn-submit {
            background-color: #ffffff;
            color: #000000;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 30px;
            width: 100%;
            max-width: 400px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <h1>UFC 329 Pick 'Em</h1>
    <div class="subtitle">Fighter (1pt) • Round (1pt) • Method (1pt) • Perfect Trilogy (5pts)</div>

    <!-- PASTE YOUR FORMSPREE LINK IN THE ACTION BELOW -->
    <form id="submissionForm" action="https://docs.google.com/spreadsheets/d/1Dsj2dxWWQo8w8B7LOsZwwzXqwlE2hkSMx6GCO2j3UzI/edit?usp=sharing" method="POST" onsubmit="return validatePicks(event)">
        
        <div class="user-info">
            <input type="text" id="username" name="Participant_Name" placeholder="Enter Your Name" required>
        </div>

        <div id="card-layout">
            <!-- Dynamic elements injection -->
        </div>

        <div class="submit-zone">
            <button type="submit" class="btn-submit">Lock In Picks</button>
        </div>
    </form>

    <script>
        const fights = [
            { id: 1, section: "Main Card", label: "01_McGregor_Holloway", f1: "Conor McGregor", f2: "Max Holloway" },
            { id: 2, section: "Main Card", label: "02_BSD_Pimblett", f1: "Benoît Saint Denis", f2: "Paddy Pimblett" },
            { id: 3, section: "Main Card", label: "03_Sandhagen_Bautista", f1: "Cory Sandhagen", f2: "Mario Bautista" },
            { id: 4, section: "Main Card", label: "04_Royval_Kavanagh", f1: "Brandon Royval", f2: "Lone'er Kavanagh" },
            { id: 5, section: "Main Card", label: "05_Green_McKinney", f1: "King Green", f2: "Terrance McKinney" },
            
            { id: 6, section: "Preliminary Card", label: "06_Krylov_Whittaker", f1: "Nikita Krylov", f2: "Robert Whittaker" },
            { id: 7, section: "Preliminary Card", label: "07_Steveson_Ellison", f1: "Gable Steveson", f2: "Elisha Ellison" },
            { id: 8, section: "Preliminary Card", label: "08_Garbrandt_Yanez", f1: "Cody Garbrandt", f2: "Adrian Yanez" },
            { id: 9, section: "Preliminary Card", label: "09_Riley_Kamaka", f1: "Luke Riley", f2: "Kai Kamaka III" },
            
            { id: 10, section: "Early Prelims", label: "10_Cortez_Cong", f1: "Tracy Cortez", f2: "Wang Cong" },
            { id: 11, section: "Early Prelims", label: "11_Pinas_Almeida", f1: "Damian Pinas", f2: "Cesar Almeida" },
            { id: 12, section: "Early Prelims", label: "12_Basharat_Garza", f1: "Farid Basharat", f2: "John Garza" },
            { id: 13, section: "Early Prelims", label: "13_Gandra_Reese", f1: "Ryan Gandra", f2: "Zachary Reese" },
            { id: 14, section: "Early Prelims", label: "14_Costa_Durden", f1: "Alessandro Costa", f2: "Cody Durden" }
        ];

        const userPicks = {};

        function initCard() {
            const container = document.getElementById('card-layout');
            let currentSection = "";
            let currentDiv = null;

            fights.forEach(fight => {
                userPicks[fight.id] = { winner: "" };

                if (fight.section !== currentSection) {
                    currentSection = fight.section;
                    const header = document.createElement('div');
                    header.className = 'section-header';
                    header.innerText = currentSection;
                    container.appendChild(header);

                    currentDiv = document.createElement('div');
                    currentDiv.className = 'fight-container';
                    container.appendChild(currentDiv);
                }

                const html = `
                    <div class="fight-row" id="fight-${fight.id}">
                        <input type="hidden" name="${fight.label}_Winner" id="input-winner-${fight.id}" value="">
                        
                        <div class="fighters">
                            <div class="fighter-cell" onclick="selectWinner(${fight.id}, 1, this)">${fight.f1}</div>
                            <div class="fighter-cell" onclick="selectWinner(${fight.id}, 2, this)">${fight.f2}</div>
                        </div>
                        <div class="props-container">
                            <select name="${fight.label}_Round">
                                <option value="None">Optional: Select Round</option>
                                <option value="R1">Round 1</option>
                                <option value="R2">Round 2</option>
                                <option value="R3">Round 3</option>
                                <option value="R4">Round 4</option>
                                <option value="R5">Round 5</option>
                            </select>
                            <select name="${fight.label}_Method">
                                <option value="None">Optional: Select Method</option>
                                <option value="KO_TKO">KO / TKO</option>
                                <option value="Submission">Submission</option>
                                <option value="Decision">Decision</option>
                            </select>
                        </div>
                    </div>
                `;
                currentDiv.innerHTML += html;
            });
        }

        function selectWinner(fightId, fighterNum, element) {
            const row = document.getElementById(`fight-${fightId}`);
            const cells = row.querySelectorAll('.fighter-cell');
            cells.forEach(cell => cell.classList.remove('selected'));

            element.classList.add('selected');
            
            const fightObj = fights.find(f => f.id === fightId);
            const fighterName = fighterNum === 1 ? fightObj.f1 : fightObj.f2;
            
            userPicks[fightId].winner = fighterName;
            document.getElementById(`input-winner-${fightId}`).value = fighterName;
        }

        function validatePicks(event) {
            let pickedCount = 0;
            for (let id in userPicks) {
                if (userPicks[id].winner) pickedCount++;
            }

            if (pickedCount < fights.length) {
                alert(`Hold up! Please pick a winner for all ${fights.length} fights before submitting.`);
                return false;
            }
            return true;
        }

        window.onload = initCard;
    </script>
</body>
</html>
